name: DevSecOps Pipeline - config-server

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  security-and-build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret detection (GitLeaks)
        run: |
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz
          tar -xzf gitleaks_8.18.2_linux_x64.tar.gz
          ./gitleaks detect --source . --verbose --no-git
        continue-on-error: true

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}

      - name: Dependency scan (Snyk)
        run: |
          npm install -g snyk
          snyk auth ${{ secrets.SNYK_TOKEN }}
          snyk test --package-manager=maven --file=pom.xml
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          JAVA_HOME: /opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/17.0.19-10/x64
          MAVEN_OPTS: "-Xmx1g"

      - name: Build and analyze with SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn clean package -DskipTests sonar:sonar
          -Dsonar.projectKey=DevSecOps-Microservices_config-server
          -Dsonar.organization=devsecops-microservices
          -Dsonar.host.url=https://sonarcloud.io

      - name: Run unit tests
        run: mvn test -Dsurefire.failIfNoSpecifiedTests=false
        continue-on-error: true

      - name: Build Docker image
        run: docker build -t config-server:latest .

      - name: Scan Docker image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: config-server:latest
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH

      - name: Trivy SARIF report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: config-server:latest
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image
        run: |
          docker tag config-server:latest ghcr.io/devsecops-microservices/config-server:latest
          docker push ghcr.io/devsecops-microservices/config-server:latest

      - name: Deploy config-server
        run: |
          docker stop config-server || true
          docker rm config-server || true
          docker pull ghcr.io/devsecops-microservices/config-server:latest
          docker run -d \
            --name config-server \
            -p 8888:8888 \
            --restart unless-stopped \
            -e SPRING_PROFILES_ACTIVE=git,vault \
            -e GIT_TOKEN=${{ secrets.GIT_TOKEN }} \
            -e VAULT_ADDR=${{ secrets.VAULT_ADDR }} \
            -e VAULT_PORT=${{ secrets.VAULT_PORT }} \
            -e VAULT_TOKEN=${{ secrets.VAULT_TOKEN }} \
            ghcr.io/devsecops-microservices/config-server:latest
          sleep 15
          echo "config-server deployed successfully"

      - name: Verify deployment
        run: |
          docker ps | grep config-server
          echo "Container is running"
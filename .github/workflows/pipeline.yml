name: DevSecOps Pipeline - config-server

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  security-and-build:
    runs-on: ubuntu-latest

    steps:

      ####################################################
      # Checkout
      ####################################################

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      ####################################################
      # Secret Scanning
      ####################################################

      - name: Secret detection (GitLeaks)
        run: |
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz
          tar -xzf gitleaks_8.18.2_linux_x64.tar.gz
          chmod +x gitleaks
          ./gitleaks detect --source . --verbose --no-git
        continue-on-error: true

      ####################################################
      # Java Setup
      ####################################################

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      ####################################################
      # Build + Unit Tests
      ####################################################

      - name: Build & Verify
        run: mvn clean verify

      ####################################################
      # SonarCloud
      ####################################################

      - name: SonarCloud Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=DevSecOps-Microservices_config-server \
            -Dsonar.organization=devsecops-microservices \
            -Dsonar.host.url=https://sonarcloud.io

      ####################################################
      # Setup Node (Required by Snyk CLI)
      ####################################################

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      ####################################################
      # Install Snyk
      ####################################################

      - name: Install Snyk CLI
        run: |
          npm install -g snyk
          snyk --version

      ####################################################
      # Authenticate
      ####################################################

      - name: Authenticate Snyk
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk whoami

      ####################################################
      # Dependency Scan
      ####################################################

      - name: Make Maven Wrapper executable
        run: chmod +x mvnw

      - name: Snyk Dependency Scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          ./mvnw dependency:tree
          snyk test \
            --file=pom.xml \
            --package-manager=maven \
            --severity-threshold=high \
            --print-deps \
            --debug
        continue-on-error: true

      ####################################################
      # Docker Build
      ####################################################

      - name: Build Docker image
        run: docker build -t config-server:latest .

      ####################################################
      # Container Scan
      ####################################################

      - name: Scan Docker image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: config-server:latest
          format: table
          exit-code: '0'
          severity: HIGH,CRITICAL

      - name: Generate Trivy SARIF
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: config-server:latest
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL

      - name: Upload Trivy Report
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      ####################################################
      # Push Image
      ####################################################

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image
        run: |
          docker tag config-server:latest ghcr.io/devsecops-microservices/config-server:latest
          docker push ghcr.io/devsecops-microservices/config-server:latest

      ####################################################
      # Deployment (Keep as-is for now)
      ####################################################

      - name: Deploy config-server
        run: |
          docker stop config-server || true
          docker rm config-server || true
          docker pull ghcr.io/devsecops-microservices/config-server:latest
          docker run -d \
            --name config-server \
            -p 8888:8888 \
            --restart unless-stopped \
            -e SPRING_PROFILES_ACTIVE=git,vault \
            -e GIT_TOKEN=${{ secrets.GIT_TOKEN }} \
            -e VAULT_ADDR=${{ secrets.VAULT_ADDR }} \
            -e VAULT_PORT=${{ secrets.VAULT_PORT }} \
            -e VAULT_TOKEN=${{ secrets.VAULT_TOKEN }} \
            ghcr.io/devsecops-microservices/config-server:latest

          sleep 15

          echo "config-server deployed successfully"

      - name: Verify deployment
        run: |
          docker ps | grep config-server
          echo "Container is running"

      - name: Verify Vault Connection
        run: |
          curl -s -H "X-Vault-Token: ${{ secrets.VAULT_TOKEN }}" \
          -H "ngrok-skip-browser-warning: true" \
          ${{ secrets.VAULT_ADDR }}/v1/secret/data/app/service-incident \
          | jq '.data.data'
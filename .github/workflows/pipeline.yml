name: DevSecOps Pipeline - config-server

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  security-and-build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret detection (GitLeaks)
        run: |
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz
          tar -xzf gitleaks_8.18.2_linux_x64.tar.gz
          chmod +x gitleaks
          ./gitleaks detect --source . --verbose --no-git
        continue-on-error: true

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven


      - name: Build & Verify
        run: mvn clean verify


      - name: SonarCloud Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=DevSecOps-Microservices_config-server \
            -Dsonar.organization=devsecops-microservices \
            -Dsonar.host.url=https://sonarcloud.io

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Snyk CLI
        run: |
          npm install -g snyk
          snyk --version

      - name: Authenticate Snyk
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk whoami

      - name: Make Maven Wrapper executable
        run: chmod +x mvnw

      - name: Snyk Dependency Scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          ./mvnw dependency:tree
          snyk test \
            --file=pom.xml \
            --package-manager=maven \
            --severity-threshold=high \
            --print-deps \
            --debug
        continue-on-error: true

      - name: Build Docker image
        run: docker build -t config-server:latest .

      - name: Scan Docker image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: config-server:latest
          format: table
          exit-code: '0'
          severity: HIGH,CRITICAL

      - name: Generate Trivy SARIF
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: config-server:latest
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL

      - name: Upload Trivy Report
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image
        run: |
          docker tag config-server:latest ghcr.io/devsecops-microservices/config-server:latest
          docker push ghcr.io/devsecops-microservices/config-server:latest
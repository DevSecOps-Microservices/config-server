spring:
  application:
    name: config-server

  profiles:
    active: git, vault

  cloud:
    config:
      server:
        git:
          uri: https://github.com/DevSecOps-Microservices/config-repo.git
          username: ${GIT_USERNAME}
          password: ${GIT_TOKEN}
          default-label: main
          clone-on-start: true
          search-paths: "."
        vault:
          host: ${VAULT_HOST:localhost}
          port: ${VAULT_PORT:8200}
          scheme: http
          authentication: TOKEN
          token: ${VAULT_TOKEN}
          kv-version: 2
          default-backend: secret
          path-to-key: app

server:
  port: 8888

eureka:
  client:
    service-url:
      defaultZone: http://eureka-service:8761/eureka

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info,metrics

  endpoint:
    health:
      show-details: always

  metrics:
    tags:
      application: ${spring.application.name}